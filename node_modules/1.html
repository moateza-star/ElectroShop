<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --tech-blue: #007bff; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; margin: 0; }
        nav { background: #000; padding: 1rem; display: flex; justify-content: space-between; }
        .hero { text-align: center; padding: 50px; background: linear-gradient(45deg, #001f3f, #007bff); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; padding: 15px; transition: transform 0.3s; border: 1px solid #333; }
        .card:hover { transform: translateY(-5px); border-color: var(--tech-blue); }
        .btn { background: var(--tech-blue); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">⚡ ElectroShop</div>
        <div>Home | Products | Cart (0)</div>
    </nav>
    <header class="hero">
        <h1>Future-Proof Your Life</h1>
        <p>Premium Electronics at Unbeatable Prices</p>
    </header>
    <main class="product-grid">
        <% products.forEach(product => { %>
            <div class="card">
                <h3><%= product.name %></h3>
                <p><%= product.category %></p>
                <h4 style="color: #007bff;">$<%= product.price %></h4>
                <button class="btn">Add to Cart</button>
            </div>
        <% }) %>
    </main>
</body>
</html>
